services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskmanager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    container_name: taskmanager-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=taskmanager_db;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: TaskManagerAPI
      Jwt__Audience: TaskManagerClient
      Jwt__AccessTokenExpirationMinutes: "15"
      Smtp__Host: mailhog
      Smtp__Port: "1025"
      Smtp__From: no-reply@taskmanager.local
      InitialAdmin__Email: ${INITIAL_ADMIN_EMAIL}
      InitialAdmin__Name: Administrador
    ports:
      - "5169:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  mailhog:
    image: mailhog/mailhog
    container_name: taskmanager-mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data: